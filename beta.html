<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>[🦅]Infinite Forest</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet" />
        <style>
            html,
            body {
                touch-action: none;
                overscroll-behavior: none;
            }
            body {
                margin: 0;
                overflow: hidden;
                font-family: "Minecraftia", sans-serif;
                background: #000;
            }
            #ui {
                position: absolute;
                top: 20px;
                left: 20px;
                color: white;
                background: rgba(0, 0, 0, 0.4);
                padding: 15px;
                border-radius: 8px;
                pointer-events: none;
                z-index: 10;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
            #inventory {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 8px;
                background: rgba(0, 0, 0, 0.7);
                padding: 10px;
                border-radius: 12px;
                border: 2px solid #fff;
                z-index: 10;

                border: 2px solid #444;

                font-weight: bold;
                border-radius: 6px;

                z-index: 100;

                left: 0;
                width: 100%;
                height: 100%;

            #joystick-base {
                position: absolute;
                bottom: 30px;

                width: 240px;

                border-radius: 50%;

                border: 2px solid rgba(255, 255, 255, 0.2);

            }
            #jump-btn:active {
                background: rgba(255, 255, 255, 0.5);
            }
            #joystick-thumb {
                position: absolute;
                width: 100px;
                height: 100px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.25);
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);

            #jump-btn {
                position: absolute;
                bottom: 40px;
                right: 40px;
                width: 100px;
                height: 100px;
                border-radius: 50%;
                background: rgba(0, 0, 0, 0.5);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 26px;
                border: 2px solid white;
                z-index: 50;
                user-select: none;
                touch-action: none;
            }
            #title-screen {
                position: fixed;
                inset: 0;
                z-index: 9999;
                background-size: cover;
                background-position: center;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #title-overlay {
                position: absolute;
                inset: 0;
                background: rgba(0, 0, 0, 0.4);
            }
            #main-menu,
            #credits-screen {
                position: relative;
                z-index: 2;
                text-align: center;
                color: white;
            }
            #main-menu h1 {
                font-size: 70px;
                margin-bottom: 30px;
                text-shadow:
                    4px 4px 0 black,
                    0 0 20px black;
            }
            #main-menu button {
                font-family: "Minecraftia", sans-serif;
                font-size: 22px;
                padding: 20px;
                border: 3px solid white;
                background: rgba(0, 0, 0, 0.7);
                color: white;
                cursor: pointer;
                transition: 0.2s;
                width: 200px;
            }
            #credits-screen button {
                font-family: "Minecraftia", sans-serif;
                font-size: 22px;
                padding: 20px;
                border: 3px solid white;
                background: rgba(0, 0, 0, 0.7);
                color: white;
                cursor: pointer;
                transition: 0.2s;
                width: 200px;
            }
            #main-menu button:hover {
                transform: scale(1.08);
            }
            #credits-screen button:hover {
                transform: scale(1.08);
            }
        </style>

        <script>
            // --- NOISE ENGINE ---
            class ImprovedNoise {
                constructor() {
                    this.p = new Uint8Array(256);
                    for (let i = 0; i < 256; i++) this.p[i] = i;
                    for (let i = 255; i > 0; i--) {
                        const r = Math.floor(Math.random() * (i + 1));
                        [this.p[i], this.p[r]] = [this.p[r], this.p[i]];
                    }
                    this.perm = new Uint8Array(512);
                    for (let i = 0; i < 512; i++) this.perm[i] = this.p[i & 255];
                }
                fade(t) {
                    return t * t * t * (t * (t * 6 - 15) + 10);
                }
                lerp(t, a, b) {
                    return a + t * (b - a);
                }
                grad(hash, x, y, z) {
                    const h = hash & 15;
                    const u = h < 8 ? x : y;
                    const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
                    return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
                }
                perlin(x, y, z) {
                    const X = Math.floor(x) & 255,
                        Y = Math.floor(y) & 255,
                        Z = Math.floor(z) & 255;
                    x -= Math.floor(x);
                    y -= Math.floor(y);
                    z -= Math.floor(z);
                    const u = this.fade(x),
                        v = this.fade(y),
                        w = this.fade(z);
                    const A = this.perm[X] + Y,
                        AA = this.perm[A] + Z,
                        AB = this.perm[A + 1] + Z;
                    const B = this.perm[X + 1] + Y,
                        BA = this.perm[B] + Z,
                        BB = this.perm[B + 1] + Z;
                    return this.lerp(
                        w,
                        this.lerp(
                            v,
                            this.lerp(u, this.grad(this.perm[AA], x, y, z), this.grad(this.perm[BA], x - 1, y, z)),
                            this.lerp(
                                u,
                                this.grad(this.perm[AB], x, y - 1, z),
                                this.grad(this.perm[BB], x - 1, y - 1, z)
                            )
                        ),
                        this.lerp(
                            v,
                            this.lerp(
                                u,
                                this.grad(this.perm[AA + 1], x, y, z - 1),
                                this.grad(this.perm[BA + 1], x - 1, y, z - 1)
                            ),
                            this.lerp(
                                u,
                                this.grad(this.perm[AB + 1], x, y - 1, z - 1),
                                this.grad(this.perm[BB + 1], x - 1, y - 1, z - 1)
                            )
                        )
                    );
                }
                fbm(x, z, octaves = 4, persistence = 0.5, scale = 1) {
                    let total = 0,
                        freq = scale,
                        amp = 1,
                        max = 0;
                    for (let i = 0; i < octaves; i++) {
                        total += this.perlin(x * freq, 0, z * freq) * amp;
                        max += amp;
                        amp *= persistence;
                        freq *= 2;
                    }
                    return total / max;
                }
            }
            // --- CONSTANTS ---
            const CHUNK_SIZE = 20;
            const VIEW_DISTANCE = 2;
            const WORLD_HEIGHT = 120;
            const SEA_LEVEL = 18;
            const noise = new ImprovedNoise();
            const chunkQueue = [];
            const chunkGenerators = new Map();
            // ☁️ CLOUD SYSTEM
            const clouds = new Map();
            const CLOUD_BLOCK_SIZE = 8;
            const CLOUD_GRID = 120; // distance between cloud cells
            const CLOUD_RADIUS = 0.5; // how far clouds spawn around player
            const CLOUD_Y = 100;
            const cloudGeo = new THREE.BoxGeometry(1, 1, 1);
            const cloudMat = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.85,
                flatShading: true,
            });
            const BLOCKS = {
                AIR: 0,
                GRASS: 1,
                STONE: 2,
                SAND: 3,
                WOOD: 4,
                LEAVES: 5,
                DIRT: 6,
                WATER: 7,
                SNOW: 8,
                GOLD: 9,
                DIAMOND: 10,
                ICE: 11,
            };
            const COLORS = {
                1: 0x3d6e32,
                2: 0x777777,
                3: 0xfce166,
                4: 0x5d4037,
                5: 0x228b22,
                6: 0x8b4513,
                7: 0x1e90ff,
                8: 0xffffff,
                9: 0xffd700,
                10: 0x00ffff,
                11: 0xaadfff,
            };
            let selectedSlot = 1;
            function getSelectedBlock() {
                const map = {
                    1: BLOCKS.GRASS,
                    2: BLOCKS.STONE,
                    3: BLOCKS.SAND,
                    4: BLOCKS.WOOD,
                    5: BLOCKS.LEAVES,
                    6: BLOCKS.DIRT,
                    7: BLOCKS.WATER,
                    8: BLOCKS.SNOW,
                    9: BLOCKS.GOLD,
                    0: BLOCKS.DIAMOND,
                    11: BLOCKS.ICE,
                };
                return map[selectedSlot] ?? BLOCKS.GRASS;
            }
            const SAVANNAH_GRASS = 0x8a7f32;
            const SAVANNAH_LEAVES = 0x6b6320;
            const TAIGA_GRASS = 0x2e4c2e;
            const TAIGA_LEAVES = 0x183315;
            // --- SCENE & RENDERER ---
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            const materials = {};
            for (let id in COLORS) {
                if (id == 7) {
                    materials[7] = new THREE.MeshPhongMaterial({
                        color: COLORS[7],
                        transparent: true,
                        opacity: 0.5,
                        depthWrite: false,
                        shininess: 20,
                        flatShading: true,
                    });
                } else {
                    materials[11] = new THREE.MeshPhongMaterial({
                        color: 0xaadfff,
                        transparent: true,
                        opacity: 0.65,
                        flatShading: true,
                    });
                    materials[id] = new THREE.MeshLambertMaterial({
                        color: COLORS[id],
                    });
                }
            }
            const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x444444, 0.8);
            scene.add(hemiLight);
            const sunPivot = new THREE.Object3D();
            scene.add(sunPivot);
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(0, 200, 0);
            sunPivot.add(sun);
            const sunMesh = new THREE.Mesh(
                new THREE.SphereGeometry(12, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xffffaa })
            );
            sunMesh.position.set(0, 400, 0);
            sunPivot.add(sunMesh);
            const moonMesh = new THREE.Mesh(
                new THREE.SphereGeometry(10, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xcccccc })
            );
            moonMesh.position.set(0, -400, 0);
            sunPivot.add(moonMesh);
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.8,
                transparent: true,
                opacity: 0,
            });
            const starVertices = [];
            for (let i = 0; i < 3000; i++) {
                const r = 600;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(Math.random() * 2 - 1);
                starVertices.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
            }
            starGeometry.setAttribute("position", new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            scene.fog = new THREE.Fog(0x87ceeb, 0, 120); // start=0, end=120 blocks
            // --- PLAYER & WORLD STATE ---
            const chunkData = new Map();
            const activeChunks = new Map();
            const mobs = [];
            const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
            let biomeDisplay, posDisplay, timeDisplay, tempDisplay, ambientOverlay;
            const player = {
                pos: new THREE.Vector3(0, 80, 0),
                vel: new THREE.Vector3(),
                rot: new THREE.Vector2(0, 0),
                onGround: false,
                speed: 0.15,
                jumpPower: 0.22,
                height: 1.8,
                chunkX: NaN,
                chunkZ: NaN,
                isGhosting: true,
            };
            let worldTime = 0;
            const DAY_LENGTH = 360000;
            const keys = {};
            // --- TERRAIN LOGIC ---
            function getTerrainInfo(x, z) {
                const continental = noise.fbm(x * 0.003, z * 0.003, 3);
                const moisture = noise.fbm(x * 0.01 + 500, z * 0.01 + 500, 2);
                const tempValue = noise.fbm(x * 0.005 - 1000, z * 0.005 - 1000, 2);
                let baseHeight = continental * 35 + 25;
                let biome = "PLAINS";
                let tempCat = "NORMAL";
                if (tempValue > 0.25) tempCat = "HIGH";
                else if (tempValue < -0.15) tempCat = "LOW";
                // MOUNTAINS
                if (continental > 0.1) {
                    biome = "MOUNTAINS";
                    const foothills = Math.max(0, continental);
                    const roughness = noise.fbm(x * 0.0015 + 999, z * 0.0015 + 999, 2);
                    const mountainBase = noise.fbm(x * 0.004, z * 0.004, 5);
                    const mountainDetail = noise.fbm(x * 0.03, z * 0.03, 4);
                    const ridges = Math.abs(noise.fbm(x * 0.06, z * 0.06, 3));
                    const smoothness = (roughness + 1) * 0.5;
                    const detailBlend = 0.3 + (1 - smoothness) * 0.7;
                    baseHeight += foothills * 50;
                    baseHeight += mountainBase * 60;
                    baseHeight += mountainDetail * 40 * detailBlend;
                    baseHeight += ridges * (20 + roughness * 80) * (1 - smoothness);
                    const peakFactor = Math.pow(Math.max(0, (continental - 0.15) / 0.4), 2.0);
                    baseHeight += peakFactor * 300;
                    baseHeight = Math.min(baseHeight, 120);
                } else if (continental < -0.2) {
                    biome = "OCEAN";
                    baseHeight = SEA_LEVEL - 10;
                } else if (continental < -0.05) {
                    biome = "BEACH";
                    baseHeight = Math.max(SEA_LEVEL - 1, baseHeight);
                } else if (moisture > 0.2) {
                    biome = "FOREST";
                }
                return {
                    height: Math.floor(baseHeight),
                    biome,
                    temp: tempCat,
                };
            }
            function* generateChunkData(cx, cz) {
                const key = `${cx},${cz}`;
                if (chunkData.has(key)) return;
                const data = new Map();
                // ===== LOOP X =====
                for (let x = 0; x < CHUNK_SIZE; x++) {
                    // ===== LOOP Z =====
                    for (let z = 0; z < CHUNK_SIZE; z++) {
                        const wx = cx * CHUNK_SIZE + x;
                        const wz = cz * CHUNK_SIZE + z;
                        const info = getTerrainInfo(wx, wz);
                        if ((x + z) % 12 === 0) yield;
                        maybeSpawnCaves(cx, cz, data);
                        maybeSpawnOres(cx, cz, data);
                        maybeSpawnWell(wx, wz, info, data);
                        maybeSpawnBase(cx, cz, data);
                        maybeSpawnIcebergs(wx, wz, info, data);
                        // ===== HEIGHT LOOP =====
                        for (let y = 0; y < WORLD_HEIGHT; y++) {
                            if (y % 8 === 0) yield;
                            if (y <= info.height) {
                                let type;
                                if (y === info.height) {
                                    if (info.biome === "MOUNTAINS" && y > 70) type = BLOCKS.SNOW;
                                    else if (info.biome === "BEACH" || info.biome === "OCEAN") type = BLOCKS.SAND;
                                    else type = BLOCKS.GRASS;
                                } else if (y > info.height - 3) {
                                    if (info.biome === "MOUNTAINS" && y > 65) type = BLOCKS.STONE;
                                    else
                                        type =
                                            info.biome === "BEACH" || info.biome === "OCEAN"
                                                ? BLOCKS.SAND
                                                : BLOCKS.DIRT;
                                } else {
                                    type = BLOCKS.STONE;
                                }
                                data.set(`${x},${y},${z}`, type);
                            } else if (y <= SEA_LEVEL) {
                                data.set(`${x},${y},${z}`, BLOCKS.WATER);
                            }
                        } // ===== END HEIGHT LOOP =====
                        // ===== TREE GENERATION =====
                        const treeSeed = noise.perlin(wx * 0.7, 0, wz * 0.7);
                        let treeChance = 0;
                        if (info.biome === "FOREST")
                            treeChance = 0.2; // Oak forests
                        else if (info.biome === "PLAINS")
                            treeChance = 0.06; // Oak sparse
                        else if (info.temp === "LOW")
                            treeChance = 0.18; // Taiga pine chance
                        else if (info.biome === "MOUNTAINS") treeChance = 0.06;
                        else if (info.temp === "HIGH") treeChance = 0.12; // Savannah acacia
                        if (treeChance > 0 && treeSeed > 0.55 && info.height > SEA_LEVEL) {
                            const h = 4 + Math.floor(Math.random() * 3); // trunk height
                            if (info.temp === "LOW") {
                                // ===== TAIGA =====
                                for (let i = 1; i <= h; i++) {
                                    data.set(`${x},${info.height + i},${z}`, BLOCKS.WOOD);
                                }
                                // Conical leaves (Taiga)
                                for (let i = 0; i <= h; i++) {
                                    const radius = Math.max(0, Math.floor((h - i + 1) / 2));
                                    const y = info.height + i + h;
                                    for (let lx = -radius; lx <= radius; lx++) {
                                        for (let lz = -radius; lz <= radius; lz++) {
                                            if (Math.abs(lx) + Math.abs(lz) <= radius) {
                                                data.set(`${x + lx},${y},${z + lz}`, BLOCKS.LEAVES);
                                            }
                                        }
                                    }
                                }
                            } else if (info.temp === "HIGH") {
                                // ===== SAVANNAH =====
                                const topR = 2 + Math.floor(Math.random() * 2);
                                let offsetX = 0,
                                    offsetZ = 0;
                                for (let i = 1; i <= h; i++) {
                                    if (Math.random() < 0.1) {
                                        offsetX += Math.floor(Math.random() * 3) - 1;
                                        offsetZ += Math.floor(Math.random() * 3) - 1;
                                    }
                                    data.set(`${x + offsetX},${info.height + i},${z + offsetZ}`, BLOCKS.WOOD);
                                }
                                for (let lx = -topR; lx <= topR; lx++) {
                                    for (let lz = -topR; lz <= topR; lz++) {
                                        if (lx * lx + lz * lz <= topR * topR + 1) {
                                            data.set(`${x + lx},${info.height + h},${z + lz}`, BLOCKS.LEAVES);
                                        }
                                    }
                                }
                            } else {
                                // ===== OAK =====
                                const leafR = 2 + Math.floor(Math.random() * 2);
                                let offsetX = 0,
                                    offsetZ = 0;
                                for (let i = 1; i <= h; i++) {
                                    if (Math.random() < 0.15) {
                                        offsetX += Math.floor(Math.random() * 3) - 1;
                                        offsetZ += Math.floor(Math.random() * 3) - 1;
                                    }
                                    data.set(`${x + offsetX},${info.height + i},${z + offsetZ}`, BLOCKS.WOOD);
                                }
                                for (let lx = -leafR; lx <= leafR; lx++) {
                                    for (let lz = -leafR; lz <= leafR; lz++) {
                                        for (let ly = -1; ly <= 2; ly++) {
                                            if (lx * lx + lz * lz + ly * ly <= leafR * leafR + 1) {
                                                if (Math.random() > 0.2) {
                                                    data.set(
                                                        `${x + lx},${info.height + h + ly},${z + lz}`,
                                                        BLOCKS.LEAVES
                                                    );
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    } // ===== Z LOOP =====
                } // ===== X LOOP =====
                yield;
                chunkData.set(key, data);
                if (Math.random() < 0.9) {
                    spawnMob(cx * CHUNK_SIZE + 8, cz * CHUNK_SIZE + 8);
                }
            }
            function maybeSpawnWell(wx, wz, info, data) {
                if (info.temp === "LOW") return;
                if (info.biome === "OCEAN" || info.biome === "BEACH") return;
                if (Math.random() > 0.0001) return;
                const holeSize = 5;
                const topY = info.height;

                currentSkyColor.lerp(targetSky, lerpFactor);
                currentFogColor.lerp(targetFog, lerpFactor);
                currentFogFar += (targetFogFar - currentFogFar) * lerpFactor;
                scene.background = currentSkyColor;
                scene.fog.color.copy(currentFogColor);
                scene.fog.far = currentFogFar;
                scene.fog.near = 0;
                // --- LIGHT INTENSITY ---
                sun.intensity = Math.max(0.1, sunY + 0.4) * 1.5;
                hemiLight.intensity = Math.max(0.2, sunY + 0.5);
                moonMesh.visible = sunY < 0;
                // --- STARS ---
                const starAlpha = sunY > 0 ? 0 : Math.min(1, (0.2 - sunY) / 0.4);
                stars.material.opacity += (starAlpha - stars.material.opacity) * 0.02;
                if (timeDisplay) {
                    const hours = (6 + worldTime * 24) % 24;
                    const hour = Math.floor(hours);
                    const minutes = Math.floor((hours - hour) * 60);
                    const timeString = String(hour).padStart(2, "0") + ":" + String(minutes).padStart(2, "0");
                    timeDisplay.innerText = `Time: ${timeString}`;
                }
                if (tempDisplay) tempDisplay.innerText = `Temp: ${info.temp}`;
                if (biomeDisplay) biomeDisplay.innerText = `Biome: ${info.biome}`;
            }
            function getBlockAt(x, y, z) {
                const cx = Math.floor(x / CHUNK_SIZE),
                    cz = Math.floor(z / CHUNK_SIZE);
                const lx = ((Math.floor(x) % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                const lz = ((Math.floor(z) % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                const data = chunkData.get(`${cx},${cz}`);
                return data ? data.get(`${lx},${Math.floor(y)},${lz}`) : null;
            }
            function checkCollision(pos) {
                const b = getBlockAt(pos.x, pos.y, pos.z);
                return b && b !== BLOCKS.AIR && b !== BLOCKS.WATER && b !== BLOCKS.LEAVES;
            }
            function createCloud(cx, cz) {
                const key = `${cx},${cz}`;
                if (clouds.has(key)) return;
                const sizeX = 35 + Math.random() * 50; // WIDER
                const sizeZ = 35 + Math.random() * 70; // WIDER
                const sizeY = 6 + Math.random() * 1; // FLAT
                const density = 0.1 + Math.random() * 0.25;
                const positions = [];
                for (let x = -sizeX; x <= sizeX; x++) {
                    for (let y = -sizeY; y <= sizeY; y++) {
                        for (let z = -sizeZ; z <= sizeZ; z++) {
                            const dist =
                                (x * x) / (sizeX * sizeX) + (z * z) / (sizeZ * sizeZ) + (y * y) / (sizeY * sizeY);
                            if (dist > 1.0) continue;
                            const n = noise.perlin(
                                (cx * CLOUD_GRID + x) * 0.05,
                                (CLOUD_Y + y) * 0.05,
                                (cz * CLOUD_GRID + z) * 0.05
                            );
                            if (n < density) continue;
                            positions.push([x, y, z]);
                        }
                    }
                }
                const mesh = new THREE.InstancedMesh(cloudGeo, cloudMat, positions.length);
                const dummy = new THREE.Object3D();
                positions.forEach((p, i) => {
                    dummy.position.set(cx * CLOUD_GRID + p[0], CLOUD_Y + p[1], cz * CLOUD_GRID + p[2]);
                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                });
                mesh.instanceMatrix.needsUpdate = true;
                scene.add(mesh);
                clouds.set(key, {
                    mesh,
                    cx,
                    cz,
                    vx: (Math.random() - 0.5) * 0.02,
                    vz: (Math.random() - 0.5) * 0.02,
                });
            }
            function updateClouds() {
                const pcx = Math.floor(player.pos.x / CLOUD_GRID);
                const pcz = Math.floor(player.pos.z / CLOUD_GRID);
                // spawn around player
                for (let x = -CLOUD_RADIUS; x <= CLOUD_RADIUS; x++) {
                    for (let z = -CLOUD_RADIUS; z <= CLOUD_RADIUS; z++) {
                        createCloud(pcx + x, pcz + z);
                    }
                }
                // move + cleanup
                for (const [key, cloud] of clouds) {
                    cloud.mesh.position.x += cloud.vx;
                    cloud.mesh.position.z += cloud.vz;
                    const dx = cloud.cx - pcx;
                    const dz = cloud.cz - pcz;
                    if (Math.abs(dx) > CLOUD_RADIUS + 2 || Math.abs(dz) > CLOUD_RADIUS + 2) {
                        scene.remove(cloud.mesh);
                        clouds.delete(key);
                    }
                }
            }
            function update() {
                updateClouds();
                updateEnvironment();
                updateMobs();
                const rotSpeed = 0.045;
                if (keys["ArrowLeft"]) player.rot.x += rotSpeed;
                if (keys["ArrowRight"]) player.rot.x -= rotSpeed;
                if (keys["ArrowUp"]) player.rot.y += rotSpeed;
                if (keys["ArrowDown"]) player.rot.y -= rotSpeed;
                player.rot.y = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, player.rot.y));
                camera.rotation.set(0, 0, 0);
                camera.rotation.order = "YXZ";
                camera.rotation.y = player.rot.x;
                camera.rotation.x = player.rot.y;
                window.move = new THREE.Vector3();
                // keyboard
                if (keys["KeyW"]) move.z -= 1;
                if (keys["KeyS"]) move.z += 1;
                if (keys["KeyA"]) move.x -= 1;
                if (keys["KeyD"]) move.x += 1;
                // mobile joystick
                move.x += touchState.moveX;
                move.z += touchState.moveY;
                move.normalize().applyQuaternion(camera.quaternion);
                move.y = 0;
                move.normalize();
                const currentBlock = getBlockAt(player.pos.x, player.pos.y - 1, player.pos.z);
                const isSwimming = currentBlock === BLOCKS.WATER;
                const finalSpeed = isSwimming ? player.speed * 0.5 : player.speed;
                player.vel.x = move.x * finalSpeed;
                player.vel.z = move.z * finalSpeed;
                if (!player.isGhosting) {
                    player.vel.y -= isSwimming ? 0.004 : 0.015;
                }
                player.pos.x += player.vel.x;
                if (checkCollision({ x: player.pos.x, y: player.pos.y - 1.2, z: player.pos.z }))
                    player.pos.x -= player.vel.x;
                player.pos.z += player.vel.z;
                if (checkCollision({ x: player.pos.x, y: player.pos.y - 1.2, z: player.pos.z }))
                    player.pos.z -= player.vel.z;
                player.pos.y += player.vel.y;
                player.onGround = false;
                const floorY = player.pos.y - player.height;
                if (checkCollision({ x: player.pos.x, y: floorY, z: player.pos.z })) {
                    player.pos.y = Math.ceil(floorY) + player.height;
                    player.vel.y = 0;
                    player.onGround = true;
                }
                if (keys["Space"] && (player.onGround || isSwimming))
                    player.vel.y = isSwimming ? 0.08 : player.jumpPower;
                camera.position.copy(player.pos);
                updateChunks();
                if (posDisplay)
                    posDisplay.innerText = `X: ${Math.round(player.pos.x)}, Y: ${Math.round(player.pos.y)}, Z: ${Math.round(player.pos.z)}`;
            }
            const raycaster = new THREE.Raycaster();
            window.addEventListener("mousedown", (e) => {
                if (e.button !== 0) return;
                raycaster.setFromCamera({ x: 0, y: 0 }, camera);
                const intersections = raycaster.intersectObjects(Array.from(activeChunks.values()), true);
                if (intersections.length > 0) {
                    const hit = intersections[0];
                    if (hit.distance > 7) return;
                    const hitPos = hit.point
                        .clone()
                        .addScaledVector(camera.getWorldDirection(new THREE.Vector3()), -0.01);
                    const bx = Math.floor(hitPos.x);
                    const by = Math.floor(hitPos.y);
                    const bz = Math.floor(hitPos.z);
                    const cx = Math.floor(bx / CHUNK_SIZE),
                        cz = Math.floor(bz / CHUNK_SIZE);
                    const lx = ((bx % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const lz = ((bz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const data = chunkData.get(`${cx},${cz}`);
                    if (data) {
                        data.set(`${lx},${by},${lz}`, BLOCKS.AIR);
                        renderChunk(cx, cz);
                    }
                }
            });
            window.addEventListener("mousedown", (e) => {
                if (e.button !== 2) return;
                raycaster.setFromCamera({ x: 0, y: 0 }, camera);
                const intersections = raycaster.intersectObjects(Array.from(activeChunks.values()), true);
                if (intersections.length > 0) {
                    const hit = intersections[0];
                    if (hit.distance > 7) return;
                    const normal = hit.face.normal.clone();
                    const hitPos = hit.point
                        .clone()
                        .addScaledVector(camera.getWorldDirection(new THREE.Vector3()), -0.01);
                    const bx = Math.floor(hitPos.x);
                    const by = Math.floor(hitPos.y);
                    const bz = Math.floor(hitPos.z);
                    const px = bx + normal.x;
                    const py = by + normal.y;
                    const pz = bz + normal.z;
                    const cx = Math.floor(px / CHUNK_SIZE);
                    const cz = Math.floor(pz / CHUNK_SIZE);
                    const lx = ((px % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const lz = ((pz % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
                    const data = chunkData.get(`${cx},${cz}`);
                    if (!data) return;
                    const selectedBlock = getSelectedBlock();
                    data.set(`${lx},${Math.floor(py)},${lz}`, selectedBlock);
                    renderChunk(cx, cz);
                }
            });
            document.querySelectorAll(".slot").forEach((slot) => {
                slot.addEventListener("click", () => {
                    document.querySelectorAll(".slot").forEach((s) => s.classList.remove("active"));
                    slot.classList.add("active");
                    selectedSlot = Number(slot.dataset.type);
                });
            });
            window.addEventListener("keydown", (e) => {
                if (e.code.startsWith("Digit")) {
                    const num = Number(e.code.replace("Digit", ""));
                    if (num >= 0 && num <= 9) {
                        selectedSlot = num;
                        document.querySelectorAll(".slot").forEach((s) => {
                            s.classList.toggle("active", Number(s.dataset.type) === num);
                        });
                    }
                }
            });
            window.addEventListener("keydown", (e) => (keys[e.code] = true));
            window.addEventListener("keyup", (e) => (keys[e.code] = false));
            function animate() {
                processChunks();
                requestAnimationFrame(animate);
                update();
                renderer.render(scene, camera);
            }
            window.onload = () => {
                biomeDisplay = document.getElementById("biome-display");
                posDisplay = document.getElementById("pos-display");
                timeDisplay = document.getElementById("time-display");
                tempDisplay = document.getElementById("temp-display");
                ambientOverlay = document.getElementById("ambient-overlay");
                const backgroundImages = [
                    "assets/thumbnail1.png",
                    "assets/thumbnail2.png",
                ];
                const randomImage = backgroundImages[Math.floor(Math.random() * backgroundImages.length)];aZ
                document.getElementById("title-screen").style.backgroundImage = `url(${randomImage})`;
                const bgMusic = new Audio(
                    "https://res.cloudinary.com/drqkilrfl/video/upload/v1781078642/Lilypad_a4imiu.mp3"
                );
                bgMusic.loop = true;
                bgMusic.volume = 0;
                document.getElementById("play-btn").addEventListener("click", async () => {
                    await bgMusic.play();
                    let targetVolume = 0.05;
                    let fadeDuration = 500;
                    let steps = 600;
                    let stepVolume = targetVolume / steps;
                    let fade = setInterval(() => {
                        bgMusic.volume = Math.min(bgMusic.volume + stepVolume, targetVolume);
                        if (bgMusic.volume >= targetVolume) {
                            clearInterval(fade);
                        }
                    }, fadeDuration / steps);
                    document.getElementById("title-screen").style.display = "none";
                });
                animate();
            };
            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            const touchState = {
                moveX: 0,
                moveY: 0,
                lookId: null,
                moveId: null,
                lastX: 0,
                lastY: 0,
                longPressTimer: null,
                longPressed: false,
            };
            const joyBase = document.getElementById("joystick-base");
            const joyThumb = document.getElementById("joystick-thumb");
            let joyActive = false;
            joyBase.addEventListener(
                "touchstart",
                (e) => {
                    const t = e.changedTouches[0];
                    touchState.moveId = t.identifier;
                    joyActive = true;
                },
                { passive: false }
            );
            joyBase.addEventListener(
                "touchmove",
                (e) => {
                    e.preventDefault();
                    if (!joyActive) return;
                    const t = e.touches[0];
                    const rect = joyBase.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    let dx = t.clientX - cx;
                    let dy = t.clientY - cy;
                    const max = rect.width / 2 - 20; // 🔥 dynamic radius (IMPORTANT FIX)
                    const len = Math.hypot(dx, dy);
                    if (len > max) {
                        dx = (dx / len) * max;
                        dy = (dy / len) * max;
                    }
                    joyThumb.style.left = "50%";
                    joyThumb.style.top = "50%";
                    joyThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    touchState.moveX = dx / max;
                    touchState.moveY = dy / max;
                },
                { passive: false }
            );
            joyBase.addEventListener("touchend", (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier !== touchState.moveId) continue;
                    touchState.moveId = null;
                    joyActive = false;
                    touchState.moveX = 0;
                    touchState.moveY = 0;
                    joyThumb.style.transform = "translate(-50%, -50%)";
                }
            });
            document.addEventListener(
                "touchstart",
                (e) => {
                    for (const t of e.changedTouches) {
                        if (t.clientX > window.innerWidth / 2) {
                            touchState.lookId = t.identifier;
                            touchState.lastX = t.clientX;
                            touchState.lastY = t.clientY;
                        }
                    }
                },
                { passive: false }
            );
            document.addEventListener(
                "touchmove",
                (e) => {
                    if (touchState.lookId === null) return;
                    for (const t of e.touches) {
                        if (t.identifier !== touchState.lookId) continue;
                        const dx = t.clientX - touchState.lastX;
                        const dy = t.clientY - touchState.lastY;
                        player.rot.x -= dx * 0.005;
                        player.rot.y -= dy * 0.005;
                        touchState.lastX = t.clientX;
                        touchState.lastY = t.clientY;
                    }
                },
                { passive: false }
            );
            document.addEventListener("touchend", (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier === touchState.lookId) {
                        touchState.lookId = null;
                    }
                }
            });
            document.getElementById("jump-btn").addEventListener("touchstart", () => {
                const jumpBtn = document.getElementById("jump-btn");
                let jumpHeld = false;
                let jumpLoop = null;
                function tryJump() {
                    if (player.onGround) {
                        player.vel.y = player.jumpPower;
                    }
                }
                jumpBtn.addEventListener("touchstart", (e) => {
                    e.preventDefault();
                    jumpHeld = true;
                    tryJump(); // instant jump
                    jumpLoop = setInterval(() => {
                        if (jumpHeld) {
                            tryJump();
                        }
                    }, 120); // adjust speed if needed
                });
                jumpBtn.addEventListener("touchend", () => {
                    jumpHeld = false;
                    clearInterval(jumpLoop);
                    jumpLoop = null;
                });
                jumpBtn.addEventListener("touchcancel", () => {
                    jumpHeld = false;
                    clearInterval(jumpLoop);
                    jumpLoop = null;
                });
            });
            document.addEventListener("touchend", () => {
                touchState.lookActive = false;
            });
            document.getElementById("inventory").addEventListener("mousedown", (e) => {
                e.stopPropagation();
            });
            document.addEventListener("contextmenu", (e) => e.preventDefault());
            const mainMenu = document.getElementById("main-menu");
            const creditsScreen = document.getElementById("credits-screen");
            document.getElementById("credits-btn").onclick = () => {
                mainMenu.style.display = "none";
                creditsScreen.style.display = "block";
            };
            document.getElementById("back-btn").onclick = () => {
                creditsScreen.style.display = "none";
                mainMenu.style.display = "block";
            };
        </script>
    </body>
</html>
