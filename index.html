<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading game...</title>
    <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Minecraftia', sans-serif; /* Authentic Minecraftia font */
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative; /* Needed for absolute positioning of background elements */
            color: #FFFFFF; /* Default text color */
        }

        /* Background image container */
        .background-image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://www.minecraft.net/content/dam/minecraftnet/games/minecraft/key-art/MCV_SummerDrop_Hero_DotNet_Homepage_1920x1080.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.6) blur(2px); /* Dim and slightly blur the background */
            z-index: -3; /* Place it furthest back */
        }

        /* Overlay to further darken the background and improve text readability */
        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Semi-transparent black overlay */
            z-index: -2; /* Place it between the image and logo */
        }

        /* Minecraft Logo styling in the background */
        .minecraft-logo-bg {
            position: absolute;
            top: 5%; /* Position near the top */
            left: 50%;
            transform: translateX(-50%); /* Center horizontally */
            width: 80%; /* Responsive width */
            max-width: 400px; /* Max width for larger screens */
            opacity: 0.8; /* Slightly transparent */
            z-index: -1; /* Behind the main content, but above the overlay */
            filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.5)); /* Dark shadow for depth */
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(85, 255, 85, 0.5); }
            50% { box-shadow: 0 0 15px rgba(85, 255, 85, 0.8); }
            100% { box-shadow: 0 0 5px rgba(85, 255, 85, 0.5); }
        }

        .minecraft-text-shadow {
            text-shadow:
                -2px -2px 0 #000,
                2px -2px 0 #000,
                -2px 2px 0 #000,
                2px 2px 0 #000;
        }

        .minecraft-border {
            border: 4px solid #555555;
            box-shadow:
                inset 0 0 0 2px #222222,
                0 0 0 2px #AAAAAA;
        }

        .progress-bar-container {
            background-color: #444444;
            border: 2px solid #222222;
            box-shadow: inset 0 0 0 1px #666666;
            overflow: hidden;
            position: relative;

            background-image:
                linear-gradient(0deg, transparent 19px, rgba(0,0,0,0.3) 19px, rgba(0,0,0,0.3) 20px, transparent 20px),
                linear-gradient(90deg, transparent 19px, rgba(0,0,0,0.3) 19px, rgba(0,0,0,0.3) 20px, transparent 20px);
            background-size: 20px 20px;
            background-position: 0 0;
        }

        .progress-fill {
            height: 100%;
            background-color: #55AA55;
            background-image: linear-gradient(
                90deg,
                rgba(0,0,0,0.2) 2px, 
                transparent 2px,
                transparent 20px 
            );
            background-size: 20px 100%; 
            animation: glow 2s infinite alternate;
            transition: width 0.1s linear;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="background-image-container"></div>
    <div class="background-overlay"></div>

    <img src="logo.png" class="minecraft-logo-bg">

    <div class="flex flex-col items-center justify-center p-8 bg-gray-800 bg-opacity-80 rounded-lg shadow-xl max-w-lg w-11/12 md:w-3/4 lg:w-1/2 minecraft-border relative z-10">
        <p id="loadingStatusText" class="text-lg md:text-xl text-gray-300 text-center minecraft-text-shadow mb-4 leading-relaxed"></p>

        <div class="w-full h-4 mb-6 progress-bar-container">
            <div id="progressBarFill" class="progress-fill" style="width: 0%;"></div>
        </div>

        <p id="tipText" class="text-lg md:text-xl text-gray-300 text-center minecraft-text-shadow leading-relaxed"></p>
    </div>

    <script>
        const loadingStatusText = document.getElementById('loadingStatusText');
        const progressBarFill = document.getElementById('progressBarFill');
        const tipText = document.getElementById('tipText');

        const loadingMessages = [
            "Joining online game",
            "Generating world",
            "Loading resources",
            "Appearance is taking a long time to load. Proceeding with world generation...",
            "Survive"
        ];

        const minecraftTips = [
            "Stone tools are better than wood, but iron is even better!",
            "Dig straight down at your own risk!",
            "Eating food restores your hunger and health.",
            "Watch out for creepers, they explode!",
            "Build a shelter before nightfall to stay safe."
        ];

        let progress = 0;
        let messageIndex = 0;
        let isPausedForResources = false;
        let pauseStartTime = 0;
        let tipIndex = 0;

        const BASE_INCREMENT = 0.8;
        const TARGET_DOWNLINK = 10;

        function getNetworkMultiplier() {

            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection && connection.downlink) {
                return Math.max(1.0, Math.min(connection.downlink / TARGET_DOWNLINK, 3));
            }
            return 1.0;
        }

        function updateLoadingProgress() {
            const currentTime = performance.now();

            if (progress >= 100) {
                progressBarFill.style.width = '100%';
                loadingStatusText.textContent = loadingMessages[loadingMessages.length - 1];
                tipText.textContent = "";
                return; 
            }

            if (isPausedForResources) {
                loadingStatusText.textContent = loadingMessages[messageIndex];
                if (currentTime - pauseStartTime >= 7000) {
                    isPausedForResources = false;
                    messageIndex++;
                }
                setTimeout(updateLoadingProgress, 100);
                return;
            }

            loadingStatusText.textContent = loadingMessages[messageIndex];

            const networkMult = getNetworkMultiplier();
 
            progress += (BASE_INCREMENT * networkMult * (Math.random() * 0.5 + 0.75));

            if (progress > 100) {
                progress = 100
                setTimeout(() => {
                    window.location.href='/world/game'
                }, 20);
            }
            progressBarFill.style.width = `${progress}%`;

            if (loadingMessages[messageIndex] === "Loading resources" && progress >= 60) {
                isPausedForResources = true;
                pauseStartTime = currentTime;
            } else if (messageIndex < loadingMessages.length - 2 && progress >= (messageIndex + 1) * 20) {
                messageIndex++;
            }

            const updateFrequency = 50 + (Math.random() * 100); 
            setTimeout(updateLoadingProgress, updateFrequency);
        }

        function displayNextTip() {
            if (progress < 100) {
                tipText.textContent = minecraftTips[tipIndex];
                tipIndex = (tipIndex + 1) % minecraftTips.length;
            }
        }

        window.onload = () => {
            displayNextTip();
            setInterval(displayNextTip, 4000);
            updateLoadingProgress();
        };
    </script>
</body>
</html>
